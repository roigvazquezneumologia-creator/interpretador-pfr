<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PFR Interpreter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #e0f2fe; }
        .header { background: #0369a1; color: white; padding: 20px; text-align: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        .panel { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .panel-title { background: #0369a1; color: white; padding: 15px; margin: -20px -20px 20px -20px; border-radius: 8px 8px 0 0; font-weight: bold; }
        .section { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .section-header { background: #f1f5f9; padding: 10px; cursor: pointer; font-weight: bold; }
        .section-content { display: none; padding: 15px; }
        .section-content.show { display: block; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 4px; }
        .form-group input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-analizar { background: #22c55e; color: white; }
        .btn-limpiar { background: #e2e8f0; }
        .result-box { background: #f0f9ff; border-left: 4px solid #0369a1; padding: 15px; margin-bottom: 15px; }
        .result-title { font-weight: bold; color: #0369a1; margin-bottom: 10px; }
        .result-table { width: 100%; font-size: 12px; }
        .result-table th { background: #dbeafe; padding: 8px; border-bottom: 2px solid #0369a1; }
        .result-table td { padding: 8px; border-bottom: 1px solid #e2e8f0; }
        .status-normal { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 3px; }
        .status-severo { background: #fecaca; color: #7f1d1d; padding: 2px 6px; border-radius: 3px; }
        @media (max-width: 1024px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🫁 PFR Interpreter v3.0</h1>
        <p>Dr. Francisco Jose Roig Vázquez</p>
    </div>
    
    <div class="container">
        <div class="panel">
            <div class="panel-title">📋 DATOS DE ENTRADA</div>
            
            <div class="section">
                <div class="section-header" onclick="toggle(this)">👤 DATOS DEL PACIENTE</div>
                <div class="section-content show">
                    <div class="form-row">
                        <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
                        <div class="form-group"><label>Edad</label><input type="number" id="edad" value="55"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Altura (cm)</label><input type="number" id="altura" value="175"></div>
                        <div class="form-group"><label>Sexo</label><select id="sexo"><option value="M">M</option><option value="F">F</option></select></div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header" onclick="toggle(this)">📈 ESPIROMETRÍA</div>
                <div class="section-content show">
                    <div class="form-row">
                        <div class="form-group"><label>FEV1 (L)</label><input type="number" id="fev1" value="2.10" step="0.01"></div>
                        <div class="form-group"><label>FVC (L)</label><input type="number" id="fvc" value="4.20" step="0.01"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>PEF (L/s)</label><input type="number" id="pef" value="8.50" step="0.01"></div>
                        <div class="form-group"><label>FEF25-75 (L/s)</label><input type="number" id="fef2575" value="0.85" step="0.01"></div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header" onclick="toggle(this)">🫁 VOLÚMENES</div>
                <div class="section-content">
                    <div class="form-row">
                        <div class="form-group"><label>TLC (L)</label><input type="number" id="tlc" value="6.20" step="0.1"></div>
                        <div class="form-group"><label>RV/TLC (%)</label><input type="number" id="rv_tlc" value="35.5" step="0.1"></div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header" onclick="toggle(this)">💨 DLCO</div>
                <div class="section-content">
                    <div class="form-row">
                        <div class="form-group"><label>DLCO (mL/min/mmHg)</label><input type="number" id="dlco" value="22.4" step="0.1"></div>
                        <div class="form-group"><label>KCO</label><input type="number" id="kco" value="4.31" step="0.01"></div>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-header" onclick="toggle(this)">🌬️ FeNO50</div>
                <div class="section-content">
                    <div class="form-group"><label>FeNO50 (ppb)</label><input type="number" id="feno50" value="18"></div>
                </div>
            </div>
            
            <div class="buttons">
                <button class="btn-analizar" onclick="analizar()">🔬 ANALIZAR</button>
                <button class="btn-limpiar" onclick="location.reload()">🗑️ LIMPIAR</button>
            </div>
        </div>
        
        <div class="panel">
            <div class="panel-title">📊 RESULTADOS</div>
            <div id="resultados">
                <p style="text-align: center; color: #999; padding: 50px 0;">Haz clic en ANALIZAR</p>
            </div>
        </div>
    </div>
    
    <script>
        function toggle(h) { h.nextElementSibling.classList.toggle('show'); }
        
        function GLI(e, s, a) {
            if (s === 'M') {
                return { fev1: 0.0414*a - 0.0244*e - 2.19, fvc: 0.06*a - 0.0214*e - 4.9, tlc: 0.0844*a - 0.0271*e - 7.99, dlco: 10.2 + 0.086*a - 0.2167*e };
            } else {
                return { fev1: 0.0342*a - 0.0255*e - 1.578, fvc: 0.0491*a - 0.0216*e - 3.59, tlc: 0.0649*a - 0.0214*e - 3.77, dlco: 8.52 + 0.071*a - 0.1714*e };
            }
        }
        
        function status(p) { return p >= 80 ? 'status-normal' : 'status-severo'; }
        
        function analizar() {
            const n = document.getElementById('nombre').value || 'Paciente';
            const e = parseInt(document.getElementById('edad').value);
            const a = parseInt(document.getElementById('altura').value);
            const s = document.getElementById('sexo').value;
            const fev1 = parseFloat(document.getElementById('fev1').value);
            const fvc = parseFloat(document.getElementById('fvc').value);
            const tlc = parseFloat(document.getElementById('tlc').value);
            const dlco = parseFloat(document.getElementById('dlco').value);
            const kco = parseFloat(document.getElementById('kco').value);
            const feno = parseFloat(document.getElementById('feno50').value);
            
            const p = GLI(e, s, a);
            const p1 = (fev1/p.fev1*100).toFixed(1);
            const p2 = (fvc/p.fvc*100).toFixed(1);
            const p3 = (tlc/p.tlc*100).toFixed(1);
            const p4 = (dlco/p.dlco*100).toFixed(1);
            const r = (fev1/fvc*100).toFixed(1);
            const pat = r < 70 ? 'OBSTRUCTIVO' : p3 < 80 ? 'RESTRICTIVO' : 'NORMAL';
            
            document.getElementById('resultados').innerHTML = `
                <div class="result-box">
                    <div class="result-title">Paciente: ${n} (${e}a, ${s})</div>
                </div>
                <div class="result-box">
                    <div class="result-title">PATRÓN: <span class="${status(p1)}">${pat}</span></div>
                    <table class="result-table">
                        <tr><td>FEV1/FVC</td><td>${r}% <span class="${r < 70 ? 'status-severo' : 'status-normal'}">${r < 70 ? 'Obstructivo' : 'Normal'}</span></td></tr>
                    </table>
                </div>
                <div class="result-box">
                    <div class="result-title">ESPIROMETRÍA</div>
                    <table class="result-table">
                        <tr><td>FEV1</td><td>${fev1} L</td><td>Predicho: ${p.fev1.toFixed(2)}</td><td><span class="${status(p1)}">${p1}%</span></td></tr>
                        <tr><td>FVC</td><td>${fvc} L</td><td>Predicho: ${p.fvc.toFixed(2)}</td><td><span class="${status(p2)}">${p2}%</span></td></tr>
                        <tr><td>TLC</td><td>${tlc} L</td><td>Predicho: ${p.tlc.toFixed(2)}</td><td><span class="${status(p3)}">${p3}%</span></td></tr>
                    </table>
                </div>
                <div class="result-box">
                    <div class="result-title">DIFUSIÓN</div>
                    <table class="result-table">
                        <tr><td>DLCO</td><td>${dlco}</td><td>Predicho: ${p.dlco.toFixed(1)}</td><td><span class="${status(p4)}">${p4}%</span></td></tr>
                        <tr><td>KCO</td><td>${kco}</td><td>Normal: 4.0-5.5</td><td><span class="${kco >= 4 ? 'status-normal' : 'status-severo'}">${(kco/4.5*100).toFixed(0)}%</span></td></tr>
                    </table>
                </div>
                <div class="result-box">
                    <div class="result-title">FeNO50: ${feno} ppb <span class="${feno < 25 ? 'status-normal' : 'status-severo'}">${feno < 25 ? 'Normal' : 'Elevado'}</span></div>
                </div>
                <p style="margin-top: 20px; font-size: 11px; color: #666;"><em>GLI 2012 • GOLD 2023 • ERS/ATS</em></p>
            `;
        }
    </script>
</body>
</html>
